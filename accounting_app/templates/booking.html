<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>預約系統</title>
</head>
<body>

<h1>預約系統</h1>

<form method="POST">
    <label>客戶名稱：</label>
    <input type="text" name="customer"><br><br>

    <label>日期：</label>
    <input type="date" name="date" id="dateInput"><br><br>
    <script>
    document.getElementById("dateInput").value = new Date().toISOString().split('T')[0];
    </script>

    <label>時間：</label>
    <input type="time" name="time"><br><br>

    <label>備註：</label>
    <input type="text" name="note"><br><br>

    <button type="submit">新增預約</button>
</form>

<hr>

<h2>預約列表</h2>

<table border="1">
<tr>
    <th>客戶</th>
    <th>日期</th>
    <th>時間</th>
    <th>備註</th>
    <th>操作</th>
</tr>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

{% for b in bookings %}
<tr>
    <td>{{ b[1] }}</td>
    <td>{{ b[2] }}</td>
    <td>{{ b[3] }}</td>
    <td>{{ b[4] }}</td>
    <td>
        <a href="/delete_booking/{{ b[0] }}">刪除</a>
    </td>
</tr>
{% endfor %}

</table>

<a href="/">回記帳首頁</a>

</body>
</html>
