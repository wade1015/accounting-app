<style>
body {
    font-family: Arial;
    padding: 20px;
}
table {
    border-collapse: collapse;
}
th, td {
    padding: 10px;
}
a {
    text-decoration: none;
    color: red;
}
</style>
<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <title>記帳首頁</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

    <div class="container mt-4">

        <h1 class="mb-4">💰 創業記帳 APP</h1>

        <a href="/add" class="btn btn-primary mb-3">➕ 新增記錄</a>
        <a href="/booking" class="btn btn-success mb-3">📅 預約系統</a>

        <p>歡迎：{{ session["user"] }}</p>
        <a href="/logout" class="btn btn-secondary">登出</a>

    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card text-white bg-success">
                <div class="card-body">
                    <h5>總收入</h5>
                    <h2>{{ income }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card text-white bg-danger">
                <div class="card-body">
                    <h5>總支出</h5>
                    <h2>{{ expense }}</h2>
                </div>
            </div>
        </div>
    </div>
    <div class="card mb-4">
        <div class="card-body">
            <h5>每月收支趨勢</h5>
            <canvas id="lineChart"></canvas>
        </div>
    </div>
    </div> <!-- container -->
</body>

<table class="table table-striped table-hover">
    <tr>
        <th>時間</th>
        <th>類型</th>
        <th>金額</th>
        <th>分類</th>
        <th>備註</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[5] }}</td>
        <td>
            {% if row[1] == "income" %}
                <span class="badge bg-success">收入</span>
            {% else %}
                <span class="badge bg-danger">支出</span>
            {% endif %}
        </td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
        <td>{{ row[4] }}</td>
        <td>
            <a href="/delete/{{ row[0] }}" class="btn btn-sm btn-danger">刪除</a>
        </td>
    </tr>
    {% endfor %}
</table>
<script>
const lineCtx = document.getElementById('lineChart');

new Chart(lineCtx, {
    type: 'line',
    data: {
        labels: {{ months | tojson }},
        datasets: [
            {
                label: '收入',
                data: {{ income_list | tojson }},
            },
            {
                label: '支出',
                data: {{ expense_list | tojson }},
            }
        ]
    }
});
</script>
</body>
</html>
